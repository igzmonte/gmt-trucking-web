name = "gmt-trucking-web"
main = "cloudflare/src/worker.mjs"
compatibility_date = "2026-07-13"

[assets]
directory = "cloudflare/public"
binding = "ASSETS"
run_worker_first = [
  "/",
  "/login",
  "/logout",
  "/health",
  "/employees",
  "/employees/*",
  "/fleet",
  "/fleet/*",
  "/clients",
  "/clients/*",
  "/suppliers",
  "/suppliers/*",
  "/recurring-trips",
  "/recurring-trips/*",
  "/trips",
  "/trips/*",
  "/repairs",
  "/payables",
  "/advances",
  "/payroll",
  "/billing",
  "/collections",
  "/reports",
  "/users",
]

[[d1_databases]]
binding = "DB"
database_name = "gmt-trucking"
database_id = "3a6fd272-3393-4a36-ba66-3abd48fbc032"

[vars]
GMT_APP_NAME = "GMT Trucking"
GMT_SESSION_SECRET = "replace-this-in-cloudflare-worker-settings"
