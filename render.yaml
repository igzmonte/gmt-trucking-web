databases:
  - name: gmt-trucking-db
    databaseName: gmt_trucking
    user: gmt_trucking
    plan: free
    region: singapore
    ipAllowList: []

services:
  - type: web
    name: gmt-trucking-web
    runtime: python
    plan: free
    region: singapore
    buildCommand: bash build.sh
    initialDeployHook: python webapp/manage.py bootstrap_hosted && python webapp/manage.py seed_hosted_preview
    startCommand: python -m gunicorn config.asgi:application --chdir webapp -k uvicorn.workers.UvicornWorker
    healthCheckPath: /health/
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gmt-trucking-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: GMT_ADMIN_USERNAME
        sync: false
      - key: GMT_ADMIN_PASSWORD
        sync: false
      - key: GMT_ADMIN_EMAIL
        sync: false
      - key: GMT_PREVIEW_ROLE_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: WEB_CONCURRENCY
        value: 2
