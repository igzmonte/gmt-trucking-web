{% extends "base.html" %}{% block content %}
<section class="panel form-panel">
  <form method="post">
    {% csrf_token %}
    <p><label>User</label><strong>{{ record.username }}</strong></p>
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit">Reset Password</button>
      <a class="button secondary" href="{% url 'users_list' %}">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
